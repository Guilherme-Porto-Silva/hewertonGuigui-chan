<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 0 1020 900" width="100%" height="100%">
    <defs>
        <filter id="shadowBlur" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4"/>
            </feComponentTransfer>
        </filter>

        <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#E28D40" />
            <stop offset="100%" stop-color="#D77D30" />
        </linearGradient>

        <path id="arrowPath" d="
            M 150 280 
            Q 110 280 110 320 
            L 110 540 
            Q 110 580 150 580 
            L 480 580 
            Q 520 580 520 620 
            L 520 700 
            Q 520 745 550 720 
            L 820 480 
            Q 875 430 820 380 
            L 550 140 
            Q 520 115 520 160 
            L 520 240 
            Q 520 280 480 280 
            Z" 
        />

        <mask id="woodMask">
            <use href="#arrowPath" stroke="#FFFFFF" stroke-width="100" stroke-linejoin="round" fill="#FFFFFF" />
        </mask>
    </defs>

    <use href="#arrowPath" stroke="#222222" stroke-width="140" stroke-linejoin="round" fill="#222222" transform="translate(15, 25)" filter="url(#shadowBlur)" />

    <use href="#arrowPath" stroke="#FFFFFF" stroke-width="140" stroke-linejoin="round" fill="#FFFFFF" />

    <use href="#arrowPath" stroke="#4A2610" stroke-width="110" stroke-linejoin="round" fill="#4A2610" />

    <g mask="url(#woodMask)">
        <use href="#arrowPath" stroke="#8A5223" stroke-width="100" stroke-linejoin="round" fill="#8A5223" />

        <polygon points="150,280 480,280 480,0 100,0" fill="#E19D51" />
        <polygon points="150,280 110,320 0,200 100,0" fill="#C8843F" />
        <polygon points="110,320 110,540 0,700 0,200" fill="#8A5223" />
        <polygon points="110,540 150,580 100,900 0,700" fill="#5B3213" />
        <polygon points="150,580 320,580 300,900 100,900" fill="#854C1C" />
        <polygon points="320,580 480,580 500,900 300,900" fill="#6D3C14" />
        <polygon points="480,580 520,620 600,900 500,900" fill="#C78036" />
        <polygon points="520,620 520,700 650,900 600,900" fill="#8E5321" />
        <polygon points="520,700 550,720 700,900 650,900" fill="#5D3312" />
        <polygon points="550,720 820,480 1000,600 700,900" fill="#B46D29" />
        <polygon points="820,480 860,430 820,380 1000,200 1000,600" fill="#ECA257" />
        <polygon points="820,380 550,140 650,0 1000,200" fill="#D38942" />
        <polygon points="550,140 520,160 550,0 650,0" fill="#B87230" />
        <polygon points="520,160 520,240 450,0 550,0" fill="#DF974E" />
        <polygon points="520,240 480,280 480,0 450,0" fill="#C27B38" />
    </g>

    <use href="#arrowPath" stroke="#F6D28A" stroke-width="16" stroke-linejoin="round" />

    <use href="#arrowPath" fill="url(#orangeGrad)" />
</svg>
